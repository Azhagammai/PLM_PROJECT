# ============================================================
#  Part Number Generator - Application Configuration
# ============================================================

server.port=8080

# ── PostgreSQL ───────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/partgeneratordb
spring.datasource.username=postgres
spring.datasource.password=Azhagammai@25879865
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──────────────────────────────────────────
# "update" = keeps existing data and adds new columns automatically
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── JSON formatting ──────────────────────────────────────────
spring.jackson.serialization.indent-output=true

# ── Logging ──────────────────────────────────────────────────
logging.level.com.partgenerator=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ── CORS allowed origins (frontend URLs) ─────────────────────
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500

# ── Part number serial counter start value ───────────────────
app.part.counter-start=10000
